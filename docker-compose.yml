name: parkflow-mall

services:
  postgres:
    image: postgres:16-alpine
    profiles: [infra, full-stack]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parkflow}
      POSTGRES_USER: ${POSTGRES_USER:-parkflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkflow-local-password}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - parkflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parkflow} -d ${POSTGRES_DB:-parkflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-service:
    build:
      context: ./services/identity-service
    profiles: [full-stack]
    environment:
      IDENTITY_SERVICE_PORT: 8081
      JWT_SECRET: ${JWT_SECRET:-parkflow-local-development-secret-change-me-2026}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
    ports:
      - "${FULLSTACK_IDENTITY_HOST_PORT:-18081}:8081"

  parking-service:
    build:
      context: ./services/parking-service
    profiles: [full-stack]
    environment:
      PARKING_SERVICE_PORT: 8082
      JWT_SECRET: ${JWT_SECRET:-parkflow-local-development-secret-change-me-2026}
      PUBLIC_BASE_URL: http://localhost:${FULLSTACK_API_GATEWAY_HOST_PORT:-18080}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-parkflow-local-internal-token-change-me}
      PARKING_DEMO_FLAT_FEE: ${PARKING_DEMO_FLAT_FEE:-5000}
      RESERVATION_SERVICE_BASE_URL: http://reservation-service:8085
    ports:
      - "${FULLSTACK_PARKING_HOST_PORT:-18082}:8082"

  payment-service:
    build:
      context: ./services/payment-service
    profiles: [full-stack]
    environment:
      PAYMENT_SERVICE_PORT: 8083
      PAYMENT_MODE: ${PAYMENT_MODE:-SIMULATION}
      PAYMENT_ORDER_TTL_MINUTES: ${PAYMENT_ORDER_TTL_MINUTES:-15}
      PARKING_SERVICE_BASE_URL: http://parking-service:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-parkflow-local-internal-token-change-me}
    ports:
      - "${FULLSTACK_PAYMENT_HOST_PORT:-18083}:8083"

  merchant-service:
    build:
      context: ./services/merchant-service
    profiles: [full-stack]
    environment:
      MERCHANT_SERVICE_PORT: 8084
      PARKING_SERVICE_BASE_URL: http://parking-service:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-parkflow-local-internal-token-change-me}
      JWT_SECRET: ${JWT_SECRET:-parkflow-local-development-secret-change-me-2026}
      MERCHANT_DISCOUNT_THRESHOLD: ${MERCHANT_DISCOUNT_THRESHOLD:-300000}
      MERCHANT_DISCOUNT_AMOUNT: ${MERCHANT_DISCOUNT_AMOUNT:-5000}
    ports:
      - "${FULLSTACK_MERCHANT_HOST_PORT:-18084}:8084"

  reservation-service:
    build:
      context: ./services/reservation-service
    profiles: [full-stack]
    environment:
      RESERVATION_SERVICE_PORT: 8085
      JWT_SECRET: ${JWT_SECRET:-parkflow-local-development-secret-change-me-2026}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-parkflow-local-internal-token-change-me}
      RESERVATION_MOTORBIKE_CAPACITY: ${RESERVATION_MOTORBIKE_CAPACITY:-20}
      RESERVATION_CAR_CAPACITY: ${RESERVATION_CAR_CAPACITY:-10}
      RESERVATION_DEFAULT_HOLD_MINUTES: ${RESERVATION_DEFAULT_HOLD_MINUTES:-60}
    ports:
      - "${FULLSTACK_RESERVATION_HOST_PORT:-18085}:8085"

  api-gateway:
    build:
      context: ./services/api-gateway
    profiles: [full-stack]
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started
      parking-service:
        condition: service_started
      payment-service:
        condition: service_started
      merchant-service:
        condition: service_started
      reservation-service:
        condition: service_started
    environment:
      API_GATEWAY_PORT: 8080
      IDENTITY_SERVICE_BASE_URL: http://identity-service:8081
      PARKING_SERVICE_BASE_URL: http://parking-service:8082
      PAYMENT_SERVICE_BASE_URL: http://payment-service:8083
      MERCHANT_SERVICE_BASE_URL: http://merchant-service:8084
      RESERVATION_SERVICE_BASE_URL: http://reservation-service:8085
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${FULLSTACK_API_GATEWAY_HOST_PORT:-18080}:8080"

volumes:
  parkflow-postgres-data:
