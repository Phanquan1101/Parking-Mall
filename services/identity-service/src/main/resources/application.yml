spring:
  application:
    name: identity-service

server:
  port: ${IDENTITY_SERVICE_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt-secret: ${JWT_SECRET:parkflow-local-development-secret-change-me-2026}
    jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
