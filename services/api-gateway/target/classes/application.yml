spring:
  application:
    name: api-gateway

server:
  port: ${API_GATEWAY_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

gateway:
  identity-base-url: ${IDENTITY_SERVICE_BASE_URL:http://localhost:${IDENTITY_SERVICE_PORT:8081}}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
