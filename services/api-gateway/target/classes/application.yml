spring:
  application:
    name: api-gateway

server:
  port: ${API_GATEWAY_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

gateway:
  identity-base-url: ${IDENTITY_SERVICE_BASE_URL:http://localhost:${IDENTITY_SERVICE_PORT:8081}}
  parking-base-url: ${PARKING_SERVICE_BASE_URL:http://localhost:${PARKING_SERVICE_PORT:8082}}
  payment-base-url: ${PAYMENT_SERVICE_BASE_URL:http://localhost:${PAYMENT_SERVICE_PORT:8083}}
  merchant-base-url: ${MERCHANT_SERVICE_BASE_URL:http://localhost:${MERCHANT_SERVICE_PORT:8084}}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
