spring:
  application:
    name: merchant-service
server:
  port: ${MERCHANT_SERVICE_PORT:8084}
management:
  endpoints:
    web:
      exposure:
        include: health,info
merchant:
  parking-base-url: ${PARKING_SERVICE_BASE_URL:http://localhost:8082}
  internal-service-token: ${INTERNAL_SERVICE_TOKEN:parkflow-local-internal-token-change-me}
  discount-threshold: ${MERCHANT_DISCOUNT_THRESHOLD:300000}
  discount-amount: ${MERCHANT_DISCOUNT_AMOUNT:5000}
  jwt-secret: ${JWT_SECRET:parkflow-local-development-secret-change-me-2026}
