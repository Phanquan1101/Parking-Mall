spring:
  application:
    name: payment-service
server:
  port: ${PAYMENT_SERVICE_PORT:8083}
management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  jwt-secret: ${JWT_SECRET:parkflow-local-development-secret-change-me-2026}
  payment-mode: ${PAYMENT_MODE:SIMULATION}
  order-ttl-minutes: ${PAYMENT_ORDER_TTL_MINUTES:15}
  parking-base-url: ${PARKING_SERVICE_BASE_URL:http://localhost:8082}
  internal-service-token: ${INTERNAL_SERVICE_TOKEN:parkflow-local-internal-token-change-me}
