spring:
  application:
    name: parking-service
server:
  port: ${PARKING_SERVICE_PORT:8082}
management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt-secret: ${JWT_SECRET:parkflow-local-development-secret-change-me-2026}
  public-ticket-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  internal-service-token: ${INTERNAL_SERVICE_TOKEN:parkflow-local-internal-token-change-me}
  demo-flat-fee: ${PARKING_DEMO_FLAT_FEE:5000}
  exit-pass-ttl-seconds: ${EXIT_PASS_TTL_SECONDS:60}
  reservation-service-base-url: ${RESERVATION_SERVICE_BASE_URL:http://localhost:8085}
